networks:
  public:
    driver: bridge
  internal:
    driver: bridge

services:
  absolute.cinema.identity-service:
    image: absolute.cinema.identity-service
    build:
      context: .
      dockerfile: source/Absolute.Cinema.IdentityService/Dockerfile
    ports:
      - "10000:8080"
      - "10001:8081"
    networks:
      - public
      - internal
  
  absolute.cinema.account-service:
    image: absolute.cinema.account-service
    build:
      context: .
      dockerfile: source/Absolute.Cinema.AccountService/Dockerfile
    ports:
      - "10100:8080"
      - "10101:8081"
    networks:
      - public
      - internal

  account-service.postgres:
    image: postgres:latest
    networks:
      - internal
    environment:
      - POSTGRES_DB=account_service_db
      - POSTGRES_USER=account-service
      - POSTGRES_PASSWORD=P@stgR3s!_X9v#2L
  #    volumes:
  #      - :var/lib/postgresql/data

  identity-service.postgres:
    image: postgres:latest
    networks:
      - internal
    environment:
      - POSTGRES_DB=identity_service_db
      - POSTGRES_USER=identity-service
      - POSTGRES_PASSWORD=X9n$3k!7P@ql#B5r
#    volumes:
#      - :var/lib/postgresql/data

  identity-service.redis:
    image: redis:latest
    networks:
      - internal
  
  account-service.redis:
    image: redis:latest
    networks:
      - internal

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: zookeeper
    networks:
      - internal
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
  
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    networks:
      - internal
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://kafka:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper